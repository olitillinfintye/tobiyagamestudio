# This workflow builds and deploys the website via SFTP on every push to main
name: SFTP Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    name: 🚀 Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm install

      - name: 🔨 Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: 📂 Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.tobiyastudio.com
          username: lovable@tobiyastudio.com
          password: ${{ secrets.ftp_password }}
          protocol: sftp
          port: 22
          timeout: 60000
          local-dir: ./dist/
          server-dir: /
